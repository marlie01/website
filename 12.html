<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#0a0a0a;
    color:white;
}

header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 8%;
    background:#111;
    border-bottom:1px solid #222;
}

.logo{
    font-size:2rem;
    font-weight:bold;
    color:#00f7ff;
}

nav a{
    color:white;
    text-decoration:none;
    margin-left:25px;
    transition:.3s;
}

nav a:hover{
    color:#00f7ff;
}

.hero{
    height:90vh;
    background:
    linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.8)),
    url('');
    background-size:cover;
    background-position:center;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.hero-content h1{
    font-size:4rem;
    text-transform:uppercase;
    text-shadow:0 0 20px #00f7ff;
}

.hero-content p{
    margin:20px 0;
    font-size:1.2rem;
}

.btn{
    display:inline-block;
    padding:15px 35px;
    background:#00f7ff;
    color:black;
    text-decoration:none;
    border-radius:30px;
    font-weight:bold;
    box-shadow:0 0 20px #00f7ff;
}

.section{
    padding:80px 8%;
}

.title{
    text-align:center;
    font-size:2.5rem;
    margin-bottom:50px;
    color:#00f7ff;
}

.games{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:25px;
}

.card{
    background:#111;
    border-radius:15px;
    overflow:hidden;
    transition:.3s;
    border:1px solid #222;
}

.card:hover{
    transform:translateY(-10px);
    box-shadow:0 0 20px rgba(0,247,255,.5);
}

.card img{
    width:100%;
    height:220px;
    object-fit:cover;
}

.card-content{
    padding:20px;
}

.card h3{
    margin-bottom:10px;
}

.tournament{
    background:#111;
    text-align:center;
    padding:80px 20px;
}

.tournament h2{
    color:#00f7ff;
    font-size:2.5rem;
    margin-bottom:20px;
}

.tournament p{
    max-width:700px;
    margin:auto;
    margin-bottom:30px;
}

footer{
    text-align:center;
    padding:25px;
    background:#050505;
    border-top:1px solid #222;
}
</style>
