<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Explore The World</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b1220;
      color: white;
    }

    /* Hero section */
    .hero {
      height: 100vh;
      background: url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=1920&q=80') center/cover no-repeat;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
      position: relative;
    }

    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
    }

    .hero-content {
      position: relative;
      z-index: 2;
    }

    .hero h1 {
      font-size: 50px;
      margin: 0;
    }

    .hero p {
      font-size: 18px;
      margin-top: 10px;
      opacity: 0.9;
    }

    .btn {
      margin-top: 20px;
      padding: 12px 25px;
      background: #00c2ff;
      color: black;
      border: none;
      border-radius: 30px;
      font-weight: bold;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }

    /* Section */
    section {
      padding: 60px 20px;
      text-align: center;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      max-width: 1000px;
      margin: auto;
    }

    .card {
      background: #111a2e;
      border-radius: 12px;
      overflow: hidden;
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .card img {
      width: 100%;
      height: 150px;
      object-fit: cover;
    }

    .card h3 {
      margin: 10px 0 5px;
    }

    .card p {
      font-size: 14px;
      opacity: 0.8;
      padding: 0 10px 15px;
    }

    footer {
      text-align: center;
      padding: 20px;
      background: #050914;
      font-size: 14px;
      opacity: 0.7;
    }
  </style>
</head>
<body>

<div class="hero">
  <div class="overlay"></div>

  <div class="hero-content">
    <h1>Explore </h1>
    <p>Discover beautiful places and amazing adventures</p>
    <a href="1.html" />GO BACK TO HOME PAGE</a>
  </div>
</div>

<section id="places">
  <h2>Popular Destinations</h2>
  <p>Find your next adventure</p>

  <div class="grid">
    <div class="card">
      <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e" />
      <h3>Beach Escape</h3>
      <p></p>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1469474968028-56623f02e42e" />
      <h3>Mountain View</h3>
      <p></p>
    </div>

    <div class="card">
      <img src="img/n.jfif" />
      <h3>Forest Trails</h3>
      <p></p>
    </div>

    <div class="card">
      <img src="img/m.jfif" />
      <h3>City Lights</h3>
      <p></p>
    </div>
  </div>
</section>

<footer>
 
</footer>

</body>
</html>
